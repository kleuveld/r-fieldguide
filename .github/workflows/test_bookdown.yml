on:
  push:
     branches:
       - test

permissions:
  contents: write
  packages: read # Grant permission to read private container images

name: Render book and do not deploy

jobs:
  bookdown:
    name: Compile rmarkdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v2

      - name: Render book (explicit command)
        timeout-minutes: 20
        run: |
          set -euxo pipefail
          docker version
          docker info

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/doc" \
            -w /doc \
            ghcr.io/kleuveld/koentainr:0.3.r_cheatsheet \
            bash -lc '
              set -euxo pipefail
              echo "Container id:"; id
              echo "pwd:"; pwd
              echo "list /doc:"; ls -la /doc
              R -q -e "bookdown::render_book(\"index.Rmd\", quiet = FALSE)"
            '

      # - name: Deploy to GitHub Pages
